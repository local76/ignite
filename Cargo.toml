[package]
name = "ignite"
version = "2026.6.10"
edition = "2024"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
sysinfo = "0.30"
library = { path = "../library", features = ["widgets", "sys-info", "window", "clipboard", "scenes"] }

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"
windows = { version = "0.52.0", features = [
    "Data_Xml_Dom",
    "UI_Notifications",
] }

[target.'cfg(windows)'.build-dependencies]
embed-resource = "2"

[package.metadata.deb]
maintainer = "Jeryd <jerydleuck@gmail.com>"
assets = [
    ["target/x86_64-unknown-linux-musl/release/ignite", "usr/bin/ignite", "755"],
    ["assets/brand/app_icon.png", "usr/share/pixmaps/ignite.png", "644"],
    ["packaging/desktop/ignite.desktop", "usr/share/applications/ignite.desktop", "644"],
]


