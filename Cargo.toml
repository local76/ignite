[package]
name = "rstartup"
version = "3.1.0"
edition = "2024"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
sysinfo = "0.30"
rcommon = { git = "https://github.com/local76/rCommon.git", branch = "main", features = ["widgets", "sys-info", "window", "clipboard", "scenes"] }

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"
windows = { version = "0.52.0", features = [
    "Data_Xml_Dom",
    "UI_Notifications",
] }

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"

[package.metadata.deb]
maintainer = "Jeryd <jerydleuck@gmail.com>"
assets = [
    ["target/x86_64-unknown-linux-musl/release/rstartup", "usr/bin/rstartup", "755"],
    ["assets/brand/app_icon.png", "usr/share/pixmaps/rstartup.png", "644"],
    ["packaging/desktop/rstartup.desktop", "usr/share/applications/rstartup.desktop", "644"],
]

[package.metadata.generate-rpm]
auto-req = "no"
assets = [
    { source = "target/x86_64-unknown-linux-musl/release/rstartup", dest = "/usr/bin/rstartup", mode = "755" },
    { source = "assets/brand/app_icon.png", dest = "/usr/share/pixmaps/rstartup.png", mode = "644" },
    { source = "packaging/desktop/rstartup.desktop", dest = "/usr/share/applications/rstartup.desktop", mode = "644" }
]

[patch."https://github.com/local76/rCommon.git"]
rcommon = { path = "../rCommon" }