[package]
name = "rstart"
version = "0.2.4"
edition = "2024"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
sysinfo = "0.30"
rcommon = { git = "https://github.com/local76/rCommon.git", branch = "main" }

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"
windows = { version = "0.52.0", features = [
    "Data_Xml_Dom",
    "UI_Notifications",
] }

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"

[package.metadata.generate-rpm]
auto-req = "no"
assets = [
    { source = "target/x86_64-unknown-linux-musl/release/rstart", dest = "/usr/bin/rstart", mode = "755" }
]




