[package]
name = "ignite"
version = "2026.6.9"
edition = "2024"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
sysinfo = "0.30"
library = { path = "../library", features = ["widgets", "sys-info", "window", "clipboard", "scenes"] }

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"
windows = { version = "0.52.0", features = [
    "Data_Xml_Dom",
    "UI_Notifications",
] }

[target.'cfg(windows)'.build-dependencies]
embed-resource = "2"


